<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#20242B">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>アドリブ練習 — コード&スケール</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html { -webkit-text-size-adjust:100%; height:100%; }
  body {
    min-height:100%; /* height固定+中央寄せだと縦長時に上端が画面外に出てスクロール不能になるためmin-height+margin:autoで中央寄せする */
    background:#EDE7D3;
    font-family: Georgia, "Times New Roman", "Hiragino Mincho ProN", serif;
    display:flex;
    padding:12px;
    /* インストール時(フルスクリーン)にステータスバー・ホームバーと重ならないようにする */
    padding-top:calc(12px + env(safe-area-inset-top));
    padding-bottom:calc(12px + env(safe-area-inset-bottom));
    color:#20242B;
  }
  .card {
    width:100%; max-width:430px; margin:auto;
    background:#F5EFDD;
    border:1px solid #E3D9BC;
    box-shadow:0 12px 32px rgba(32,36,43,.18);
    overflow:hidden; border-radius:4px;
  }
  /* header */
  .hdr {
    padding:18px 18px 14px;
    display:flex; align-items:center; justify-content:space-between;
    flex-wrap:wrap; gap:10px; /* 狭い画面ではキー選択を下の行に折り返し、見切れを防ぐ */
    border-bottom:1px solid #E3D9BC;
    background-image: repeating-linear-gradient(to bottom, transparent 0 7px, rgba(32,36,43,.10) 7px 8px);
    background-position:0 20px; background-size:100% 40px; background-repeat:no-repeat;
  }
  .hdr .eyebrow { font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:#5A6070; font-family:system-ui,sans-serif; }
  .hdr h1 { font-size:19px; }
  .hdr h1 .clef { font-size:26px; vertical-align:-3px; }
  select, option { font-family:system-ui,sans-serif; }
  .keyWrap { display:flex; flex-direction:row; gap:8px; align-items:center; flex:1; justify-content:flex-end; min-width:0; }
  .keyWrap .keyLabel { font-size:10px; letter-spacing:.15em; color:#5A6070; font-family:system-ui,sans-serif; white-space:nowrap; }
  #keySel { font-size:16px; font-weight:600; padding:8px 10px; border:1.5px solid #E4A93B; border-radius:4px; background:#fff; max-width:100%; }
  @media (max-width:380px){
    .hdr h1 { font-size:17px; }
    .keyWrap { flex-basis:100%; justify-content:stretch; }
    #keySel { flex:1; }
  }

  /* flash card */
  .flash { text-align:center; padding:26px 18px; transition:background .25s; }
  .badge {
    display:inline-block; font-family:system-ui,sans-serif; font-size:12px; font-weight:600;
    padding:3px 8px; margin-bottom:14px; background:#fff; border-radius:2px; border:1px solid currentColor;
  }
  .chord { font-size:60px; font-weight:700; letter-spacing:-1px; line-height:1.05; }
  .scaleName { margin-top:8px; font-size:19px; font-family:system-ui,sans-serif; font-weight:600; }
  .scaleNotes { margin-top:6px; font-size:14px; font-family:ui-monospace,Menlo,monospace; letter-spacing:.06em; color:#5A6070; }
  .chNote { color:#7A4A00; font-weight:700; background:rgba(228,169,59,.4); border-radius:2px; padding:0 3px; }
  .notation { margin-top:14px; }
  .notation svg { width:100%; height:auto; display:block; }
  .chLabel { margin-top:4px; font-family:system-ui,sans-serif; font-size:12px; color:#5A6070; display:flex; align-items:center; justify-content:center; gap:6px; }
  .chLabel .chDot { width:10px; height:10px; border-radius:50%; background:#E4A93B; border:1px solid #20242B; flex:none; }

  /* metronome */
  .metro { background:#20242B; padding:16px 18px 18px; font-family:system-ui,sans-serif; }
  .beats { display:flex; justify-content:center; align-items:center; gap:10px; margin-bottom:14px; }
  .beats .dot { width:13px; height:13px; border-radius:50%; background:rgba(255,255,255,.18); transition:background .05s; }
  .beats .dot.sub { width:8px; height:8px; }
  .beats .dot.on { background:#EDEBE2; }
  .beats .dot.down { background:#E4A93B; }
  .bpmRow { display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:10px; }
  .bpmRow button {
    width:34px; height:34px; border-radius:50%; border:1px solid rgba(255,255,255,.25);
    background:transparent; color:rgba(255,255,255,.85); font-size:18px;
  }
  #bpmVal { font-family:ui-monospace,Menlo,monospace; font-size:34px; color:#fff; width:90px; text-align:center; font-variant-numeric:tabular-nums; }
  input[type=range] { width:100%; margin-bottom:14px; accent-color:#E4A93B; }
  .opts { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; color:rgba(255,255,255,.8); font-size:12px; margin-bottom:14px; }
  .opts label { display:flex; flex-direction:column; gap:4px; }
  .opts select { padding:5px; border-radius:4px; border:none; }
  .opts .chk { flex-direction:row; align-items:center; gap:8px; margin-top:18px; }
  .feelHint { color:rgba(255,255,255,.55); font-size:11px; text-align:center; margin:-6px 0 12px; min-height:14px; }
  .customTs { display:flex; align-items:flex-end; gap:8px; color:rgba(255,255,255,.8); font-size:12px; margin:-6px 0 14px; }
  .customTs label { display:flex; flex-direction:column; gap:4px; }
  .customTs .grp { flex:1; }
  .customTs input { padding:5px; border-radius:4px; border:none; width:100%; font-size:13px; }
  .customTs input[type=number] { width:52px; }
  .customTs .slash { font-size:20px; color:rgba(255,255,255,.5); padding-bottom:4px; }
  .customTs select { padding:5px; border-radius:4px; border:none; }
  .soundRow { display:flex; justify-content:center; gap:18px; color:rgba(255,255,255,.85); font-size:12.5px; margin-bottom:14px; }
  .soundRow label { display:flex; align-items:center; gap:6px; }
  .soundRow input { accent-color:#E4A93B; }
  .btnRow { display:flex; gap:8px; }
  .btnRow button { border:none; border-radius:3px; padding:12px 14px; font-size:14px; font-weight:700; }
  #playBtn { flex:1; background:#E4A93B; color:#20242B; }
  #playBtn.playing { background:#8A3B3B; color:#fff; }
  #tapBtn, #nextBtn { background:transparent; color:#fff; border:1px solid rgba(255,255,255,.3); font-weight:600; }

  /* progression & filters */
  .progRow { padding:14px 18px 0; display:flex; align-items:center; gap:14px; flex-wrap:wrap; font-family:system-ui,sans-serif; font-size:12px; color:#5A6070; }
  .progRow select { padding:6px 8px; border:1px solid #E3D9BC; border-radius:4px; background:#fff; font-size:13px; }
  .progRow label { display:flex; align-items:center; gap:6px; }
  .progRow input { accent-color:#E4A93B; }
  .filters { padding:14px 18px 18px; display:flex; flex-wrap:wrap; gap:8px; font-family:system-ui,sans-serif; }
  .filters button {
    font-size:12px; font-weight:600; padding:6px 10px; border-radius:2px; background:#fff; border:1.5px solid;
  }
  .filters button.on { color:#fff !important; }
  .filters button:disabled { opacity:.45; }
  .dimmed { opacity:.45; pointer-events:none; }
</style>
</head>
<body>
<div class="card">
  <div class="hdr">
    <div>
      <div class="eyebrow">Ad-lib Practice</div>
      <h1><span class="clef">𝄞</span> コード & スケール</h1>
    </div>
    <div class="keyWrap">
      <span class="keyLabel">キー選択</span>
      <select id="keySel"></select>
    </div>
  </div>

  <div class="flash" id="flash">
    <div class="badge" id="badge"></div>
    <div class="chord" id="chord"></div>
    <div class="scaleName" id="scaleName"></div>
    <div class="scaleNotes" id="scaleNotes"></div>
    <div class="notation">
      <div id="staffWrap"></div>
      <div id="tabWrap"></div>
      <div class="chLabel"><span class="chDot" id="chDot"></span><span id="chLabel"></span></div>
    </div>
  </div>

  <div class="metro">
    <div class="beats" id="beats"></div>
    <div class="bpmRow">
      <button id="bpmDown">−</button>
      <div id="bpmVal">96</div>
      <button id="bpmUp">＋</button>
    </div>
    <input type="range" id="bpmSlider" min="30" max="300" value="96">
    <div class="opts">
      <label>拍子
        <select id="tsSel">
          <option value="2/4">2/4</option><option value="3/4">3/4</option>
          <option value="4/4" selected>4/4</option><option value="5/4">5/4</option>
          <option value="6/4">6/4</option><option value="7/4">7/4</option>
          <option value="5/8">5/8 (3+2)</option><option value="6/8">6/8 (3+3)</option>
          <option value="7/8">7/8 (2+2+3)</option><option value="9/8">9/8 (3+3+3)</option>
          <option value="12/8">12/8</option>
          <option value="custom">カスタム…</option>
        </select>
      </label>
      <label>小節/コード
        <select id="barsSel">
          <option value="1">1</option><option value="2" selected>2</option>
          <option value="4">4</option><option value="8">8</option>
        </select>
      </label>
      <label class="chk"><input type="checkbox" id="autoChk" checked> 自動進行</label>
      <label>ノリ
        <select id="feelSel">
          <option value="just" selected>ジャスト</option>
          <option value="ahead">前ノリ</option>
          <option value="behind">後ノリ</option>
        </select>
      </label>
      <label>ノリ幅
        <select id="feelAmt">
          <option value="10">10ms</option>
          <option value="20" selected>20ms</option>
          <option value="40">40ms</option>
        </select>
      </label>
    </div>
    <div class="customTs" id="customTs" style="display:none">
      <label>分子
        <input type="number" id="ctsNum" min="1" max="24" value="8">
      </label>
      <span class="slash">/</span>
      <label>分母
        <select id="ctsDen">
          <option value="2">2</option><option value="3">3</option><option value="4">4</option>
          <option value="5">5</option><option value="6" selected>6</option><option value="7">7</option>
          <option value="8">8</option><option value="9">9</option><option value="10">10</option>
          <option value="12">12</option><option value="16">16</option>
        </select>
      </label>
      <label class="grp">アクセント
        <input type="text" id="ctsGrp" placeholder="例: 3+3+2(任意)" inputmode="numeric">
      </label>
    </div>
    <div class="feelHint" id="feelHint"></div>
    <div class="soundRow">
      <label><input type="checkbox" id="clickChk" checked> クリック</label>
      <label><input type="checkbox" id="chordChk"> コード音</label>
      <label><input type="checkbox" id="scaleChk"> スケール音</label>
      <label><input type="checkbox" id="countChk"> カウントイン</label>
    </div>
    <div class="btnRow">
      <button id="playBtn">▶ 開始</button>
      <button id="tapBtn">TAP</button>
      <button id="nextBtn">次のコード</button>
    </div>
  </div>

  <div class="progRow">
    <label>進行
      <select id="progSel">
        <option value="random" selected>ランダム出題</option>
        <option value="jazz251">ジャズ ⅱ-Ⅴ-Ⅰ</option>
        <option value="minor251">マイナー ⅱ-Ⅴ-ⅰ</option>
        <option value="blues">ブルース(12小節)</option>
        <option value="pops">ポップス Ⅰ-Ⅴ-ⅵ-Ⅳ</option>
        <option value="bossa">ボサノバ</option>
        <option value="funk">ファンク(9thワンコード)</option>
      </select>
    </label>
    <label><input type="checkbox" id="varietyChk" checked> スケールおまかせ(ペンタ等も出題)</label>
  </div>
  <div class="filters" id="filters"></div>
</div>

<script>
// ---------- theory data ----------
// ch: 特徴音(スケールルートからの半音数) / chJa: 説明ラベル
const SCALES = {
  ionian:{iv:[0,2,4,5,7,9,11],ja:"アイオニアン",ch:[5],chJa:"完全4度(コード上ではアヴォイド気味)"},
  dorian:{iv:[0,2,3,5,7,9,10],ja:"ドリアン",ch:[9],chJa:"長6度(13th)"},
  phrygian:{iv:[0,1,3,5,7,8,10],ja:"フリジアン",ch:[1],chJa:"短2度(♭9)"},
  lydian:{iv:[0,2,4,6,7,9,11],ja:"リディアン",ch:[6],chJa:"増4度(♯11)"},
  mixolydian:{iv:[0,2,4,5,7,9,10],ja:"ミクソリディアン",ch:[10],chJa:"短7度(♭7)"},
  aeolian:{iv:[0,2,3,5,7,8,10],ja:"エオリアン",ch:[8],chJa:"短6度(♭13)"},
  locrian:{iv:[0,1,3,5,6,8,10],ja:"ロクリアン",ch:[1,6],chJa:"短2度(♭9)と減5度(♭5)"},
  harmonicMinor:{iv:[0,2,3,5,7,8,11],ja:"ハーモニックマイナー",ch:[8,11],chJa:"♭6と♮7(間の増2度が特徴)"},
  melodicMinor:{iv:[0,2,3,5,7,9,11],ja:"メロディックマイナー",ch:[9,11],chJa:"♮6と♮7(上行形)"},
  locrianNat2:{iv:[0,2,3,5,6,8,10],ja:"ロクリアン♮2",ch:[2,6],chJa:"♮9(ロクリアンとの違い)と♭5"},
  altered:{iv:[0,1,3,4,6,8,10],ja:"オルタード",ch:[1,3,6,8],chJa:"♭9・♯9・♯11・♭13(オルタードテンション)"},
  lydianDominant:{iv:[0,2,4,6,7,9,10],ja:"リディアン7th",ch:[6,10],chJa:"♯11と♭7"},
  wholeHalfDim:{iv:[0,2,3,5,6,8,9,11],ja:"コンビネーションディミニッシュ",ch:[2,5,8,11],chJa:"9・11・♭13・♮7(コードトーン間のテンション)"},
  majorPenta:{iv:[0,2,4,7,9],ja:"メジャーペンタ",ch:[],chJa:"なし(アヴォイド無しでどこでも安心)"},
  minorPenta:{iv:[0,3,5,7,10],ja:"マイナーペンタ",ch:[],chJa:"なし(アヴォイド無しでどこでも安心)"},
  blues:{iv:[0,3,5,6,7,10],ja:"ブルース",ch:[6],chJa:"♭5(ブルーノート)"},
  halfWholeDim:{iv:[0,1,3,4,6,7,9,10],ja:"ドミナントディミニッシュ(H-W)",ch:[1,3,6,9],chJa:"♭9・♯9・♯11・13"},
};
const SUF={maj7:"maj7",m7:"m7","7":"7",m7b5:"m7♭5",dim7:"°7",mMaj7:"m(maj7)","6":"6",m6:"m6","9":"9",m9:"m9",maj9:"maj9","7b9":"7♭9","13":"13"};
// alts: 「スケールおまかせ」ON時に基本スケールと合わせて抽選される代替スケール
const ENTRIES=[
  {id:"I",roman:"Ⅰ△7",cr:0,ct:"maj7",sr:0,sc:"ionian",cat:"diatonic",alts:[{sr:0,sc:"majorPenta"},{sr:0,sc:"lydian"}]},
  {id:"ii",roman:"ⅱm7",cr:2,ct:"m7",sr:2,sc:"dorian",cat:"diatonic",alts:[{sr:2,sc:"minorPenta"},{sr:2,sc:"melodicMinor"}]},
  {id:"iii",roman:"ⅲm7",cr:4,ct:"m7",sr:4,sc:"phrygian",cat:"diatonic",alts:[{sr:4,sc:"minorPenta"}]},
  {id:"IV",roman:"Ⅳ△7",cr:5,ct:"maj7",sr:5,sc:"lydian",cat:"diatonic",alts:[{sr:5,sc:"majorPenta"}]},
  {id:"V",roman:"Ⅴ7",cr:7,ct:"7",sr:7,sc:"mixolydian",cat:"diatonic",alts:[{sr:7,sc:"altered"},{sr:7,sc:"lydianDominant"},{sr:7,sc:"halfWholeDim"}]},
  {id:"vi",roman:"ⅵm7",cr:9,ct:"m7",sr:9,sc:"aeolian",cat:"diatonic",alts:[{sr:9,sc:"minorPenta"}]},
  {id:"vii",roman:"ⅶø7",cr:11,ct:"m7b5",sr:11,sc:"locrian",cat:"diatonic",alts:[{sr:11,sc:"locrianNat2"}]},
  {id:"V7ii",roman:"Ⅴ7/ⅱ",cr:9,ct:"7",sr:9,sc:"mixolydian",cat:"secondary",alts:[{sr:9,sc:"altered"},{sr:9,sc:"halfWholeDim"}]},
  {id:"V7iii",roman:"Ⅴ7/ⅲ",cr:11,ct:"7",sr:11,sc:"mixolydian",cat:"secondary",alts:[{sr:11,sc:"altered"},{sr:11,sc:"halfWholeDim"}]},
  {id:"V7IV",roman:"Ⅴ7/Ⅳ (=Ⅰ7)",cr:0,ct:"7",sr:0,sc:"mixolydian",cat:"secondary",alts:[{sr:0,sc:"lydianDominant"},{sr:0,sc:"halfWholeDim"}]},
  {id:"V7V",roman:"Ⅴ7/Ⅴ",cr:2,ct:"7",sr:2,sc:"mixolydian",cat:"secondary",alts:[{sr:2,sc:"altered"},{sr:2,sc:"halfWholeDim"}]},

  {id:"subV",roman:"sub Ⅴ7 (裏コード)",cr:1,ct:"7",sr:1,sc:"lydianDominant",cat:"subs"},
  {id:"subVii",roman:"sub Ⅴ7/ⅱ (裏コード)",cr:3,ct:"7",sr:3,sc:"lydianDominant",cat:"subs"},
  {id:"viidim",roman:"ⅶ°7 (パッシング)",cr:11,ct:"dim7",sr:11,sc:"wholeHalfDim",cat:"subs"},
  {id:"iio",roman:"ⅱø7 (borrowed)",cr:2,ct:"m7b5",sr:2,sc:"locrianNat2",cat:"minorii",alts:[{sr:2,sc:"locrian"}]},
  {id:"Valt",roman:"Ⅴ7alt (borrowed)",cr:7,ct:"7",sr:7,sc:"altered",cat:"minorii",alts:[{sr:7,sc:"halfWholeDim"},{sr:0,sc:"harmonicMinor"}]},
  {id:"imM7",roman:"ⅰm(maj7) (tonic minor)",cr:0,ct:"mMaj7",sr:0,sc:"melodicMinor",cat:"minorii",alts:[{sr:0,sc:"harmonicMinor"},{sr:0,sc:"minorPenta"}]},

// ジャンル別進行(bars=そのコードの小節数、キーに対する相対で定義)
const PROGS={
  jazz251:{label:"ジャズ ⅱ-Ⅴ-Ⅰ",steps:[
    {roman:"ⅱm9",cr:2,ct:"m9",sr:2,sc:"dorian",cat:"diatonic",bars:1,alts:[{sr:2,sc:"minorPenta"},{sr:2,sc:"melodicMinor"}]},

    {roman:"Ⅰmaj9",cr:0,ct:"maj9",sr:0,sc:"ionian",cat:"diatonic",bars:2,alts:[{sr:0,sc:"majorPenta"},{sr:0,sc:"lydian"}]},
  ]},
  minor251:{label:"マイナー ⅱ-Ⅴ-ⅰ",steps:[
    {roman:"ⅱø7",cr:2,ct:"m7b5",sr:2,sc:"locrianNat2",cat:"minorii",bars:1,alts:[{sr:2,sc:"locrian"}]},
    {roman:"Ⅴ7♭9",cr:7,ct:"7b9",sr:0,sc:"harmonicMinor",cat:"secondary",bars:1,alts:[{sr:7,sc:"altered"},{sr:7,sc:"halfWholeDim"}]},
    {roman:"ⅰm6",cr:0,ct:"m6",sr:0,sc:"melodicMinor",cat:"minorii",bars:2,alts:[{sr:0,sc:"minorPenta"},{sr:0,sc:"harmonicMinor"}]},
  ]},
  blues:{label:"ブルース(12小節)",steps:[
    {roman:"Ⅰ7",cr:0,ct:"7",sr:0,sc:"mixolydian",cat:"diatonic",bars:1,alts:[{sr:0,sc:"blues"},{sr:0,sc:"minorPenta"},{sr:0,sc:"majorPenta"}]},
    {roman:"Ⅳ7",cr:5,ct:"7",sr:5,sc:"mixolydian",cat:"subs",bars:1,alts:[{sr:0,sc:"blues"}]},
    {roman:"Ⅰ7",cr:0,ct:"7",sr:0,sc:"mixolydian",cat:"diatonic",bars:2,alts:[{sr:0,sc:"blues"},{sr:0,sc:"minorPenta"}]},
    {roman:"Ⅳ9",cr:5,ct:"9",sr:5,sc:"mixolydian",cat:"subs",bars:2,alts:[{sr:0,sc:"blues"}]},
    {roman:"Ⅰ7",cr:0,ct:"7",sr:0,sc:"mixolydian",cat:"diatonic",bars:2,alts:[{sr:0,sc:"majorPenta"},{sr:0,sc:"blues"}]},
    {roman:"Ⅴ9",cr:7,ct:"9",sr:7,sc:"mixolydian",cat:"secondary",bars:1,alts:[{sr:7,sc:"halfWholeDim"},{sr:0,sc:"blues"}]},
    {roman:"Ⅳ9",cr:5,ct:"9",sr:5,sc:"mixolydian",cat:"subs",bars:1,alts:[{sr:0,sc:"blues"}]},
    {roman:"Ⅰ7",cr:0,ct:"7",sr:0,sc:"mixolydian",cat:"diatonic",bars:1,alts:[{sr:0,sc:"blues"}]},
    {roman:"Ⅴ7",cr:7,ct:"7",sr:7,sc:"mixolydian",cat:"secondary",bars:1,alts:[{sr:7,sc:"altered"},{sr:0,sc:"blues"}]},
  ]},
  pops:{label:"ポップス Ⅰ-Ⅴ-ⅵ-Ⅳ",steps:[
    {roman:"Ⅰmaj7",cr:0,ct:"maj7",sr:0,sc:"ionian",cat:"diatonic",bars:1,alts:[{sr:0,sc:"majorPenta"}]},
    {roman:"Ⅴ7",cr:7,ct:"7",sr:7,sc:"mixolydian",cat:"secondary",bars:1,alts:[{sr:0,sc:"majorPenta"}]},
    {roman:"ⅵm7",cr:9,ct:"m7",sr:9,sc:"aeolian",cat:"diatonic",bars:1,alts:[{sr:9,sc:"minorPenta"}]},
    {roman:"Ⅳmaj7",cr:5,ct:"maj7",sr:5,sc:"lydian",cat:"diatonic",bars:1,alts:[{sr:0,sc:"majorPenta"}]},
  ]},
  bossa:{label:"ボサノバ",steps:[
    {roman:"Ⅰmaj9",cr:0,ct:"maj9",sr:0,sc:"ionian",cat:"diatonic",bars:2,alts:[{sr:0,sc:"lydian"},{sr:0,sc:"majorPenta"}]},
    {roman:"Ⅱ9(♯11)",cr:2,ct:"9",sr:2,sc:"lydianDominant",cat:"secondary",bars:2},
    {roman:"ⅱm9",cr:2,ct:"m9",sr:2,sc:"dorian",cat:"diatonic",bars:1,alts:[{sr:2,sc:"minorPenta"}]},
    {roman:"Ⅴ13",cr:7,ct:"13",sr:7,sc:"mixolydian",cat:"secondary",bars:1,alts:[{sr:7,sc:"altered"},{sr:7,sc:"halfWholeDim"}]},
  ]},
  funk:{label:"ファンク(9thワンコード)",steps:[
    {roman:"Ⅰ9",cr:0,ct:"9",sr:0,sc:"mixolydian",cat:"diatonic",bars:4,alts:[{sr:0,sc:"blues"},{sr:0,sc:"minorPenta"},{sr:0,sc:"dorian"}]},
    {roman:"Ⅳ9",cr:5,ct:"9",sr:5,sc:"mixolydian",cat:"subs",bars:2,alts:[{sr:0,sc:"blues"}]},
    {roman:"Ⅰ9",cr:0,ct:"9",sr:0,sc:"mixolydian",cat:"diatonic",bars:2,alts:[{sr:0,sc:"minorPenta"}]},
  ]},
};
const KEYS=[
  {n:"C",pc:0,f:false},{n:"G",pc:7,f:false},{n:"D",pc:2,f:false},{n:"A",pc:9,f:false},
  {n:"E",pc:4,f:false},{n:"B",pc:11,f:false},{n:"F#",pc:6,f:false},
  {n:"F",pc:5,f:true},{n:"B♭",pc:10,f:true},{n:"E♭",pc:3,f:true},{n:"A♭",pc:8,f:true},{n:"D♭",pc:1,f:true},
];
const SHARPS=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const FLATS=["C","D♭","D","E♭","E","F","G♭","G","A♭","A","B♭","B"];
const nn=(pc,f)=> (f?FLATS:SHARPS)[((pc%12)+12)%12];
const CATS={
  diatonic:{label:"ダイアトニック",color:"#2F5C7A",bg:"#D9E6EC"},
  secondary:{label:"セカンダリードミナント",color:"#B5651D",bg:"#F1DDB8"},
  subs:{label:"代理・ディミニッシュ",color:"#8A3B3B",bg:"#EACFCB"},
  minorii:{label:"マイナーⅱ-Ⅴ-ⅰ (借用)",color:"#5B4B8A",bg:"#DBD3EC"},
};

// ---------- state ----------
// 拍子: b=1小節のパルス数, u=単位(4=四分/8=八分), g=八分系のアクセントグループ
const TSIGS={
  "2/4":{b:2,u:4},"3/4":{b:3,u:4},"4/4":{b:4,u:4},"5/4":{b:5,u:4},"6/4":{b:6,u:4},"7/4":{b:7,u:4},
  "5/8":{b:5,u:8,g:[3,2]},"6/8":{b:6,u:8,g:[3,3]},"7/8":{b:7,u:8,g:[2,2,3]},"9/8":{b:9,u:8,g:[3,3,3]},"12/8":{b:12,u:8,g:[3,3,3,3]},
};
let keyIndex=0;
let cats={diatonic:true,secondary:true,subs:false,minorii:false};
let current=ENTRIES[0], lastId=ENTRIES[0].id;
let currentScale={sr:ENTRIES[0].sr,sc:ENTRIES[0].sc}; // 表示・再生中のスケール(おまかせ時はaltsから抽選)
let scaleVariety=true; // スケールおまかせ
let progMode="random", progStep=0; // ジャンル別進行
let bpm=96, ts=TSIGS["4/4"], barsPerChord=2, autoAdv=true, playing=false;
let feel="just", feelMs=20; // ノリ: just/ahead(前)/behind(後) とズレ幅
let clickOn=true, chordSoundOn=false, scaleSoundOn=false; // サウンドレイヤー
let countIn=false; // カウントイン(開始前に1小節クリックのみ)
let barCount=0, lastChangeBar=0; // コード自動進行の小節カウンタ(barLoop内で更新)
let clickLoop=null, barLoop=null, hi=null, lo=null, guide=null, chordSynth=null, scaleSynth=null;
let tapTimes=[];

// コードタイプ→構成音(ルートからの半音数)
const CHORD_IV={maj7:[0,4,7,11],m7:[0,3,7,10],"7":[0,4,7,10],m7b5:[0,3,6,10],dim7:[0,3,6,9],mMaj7:[0,3,7,11],
  "6":[0,4,7,9],m6:[0,3,7,9],"9":[0,4,10,14],m9:[0,3,10,14],maj9:[0,4,11,14],"7b9":[0,4,10,13],"13":[0,4,10,14,21]};
function chordFreqs(){
  const k=KEYS[keyIndex];
  const rootMidi=48+((k.pc+current.cr)%12);
  return CHORD_IV[current.ct].map(v=>Tone.Frequency(rootMidi+v,"midi"));
}
function scaleFreqs(){
  const k=KEYS[keyIndex], s=SCALES[currentScale.sc], scaleRoot=(k.pc+currentScale.sr)%12;
  return [...s.iv,12].map(v=>Tone.Frequency(60+scaleRoot+v,"midi"));
}

function groupStarts(){
  const gs=new Set();
  if(ts.g){let a=0; ts.g.forEach(len=>{gs.add(a);a+=len;});}
  else for(let i=0;i<ts.b;i++) gs.add(i);
  return gs;
}

// ---------- dom ----------
const $=id=>document.getElementById(id);
KEYS.forEach((k,i)=>{const o=document.createElement("option");o.value=i;o.textContent="Key: "+k.n;$("keySel").appendChild(o);});

Object.entries(CATS).forEach(([id,m])=>{
  const b=document.createElement("button");
  b.textContent=m.label; b.style.borderColor=m.color; b.dataset.cat=id;
  b.onclick=()=>{cats[id]=!cats[id]; renderFilters();};
  $("filters").appendChild(b);
});
function renderFilters(){
  [...$("filters").children].forEach(b=>{
    const m=CATS[b.dataset.cat], on=cats[b.dataset.cat];
    b.classList.toggle("on",on);
    b.style.background=on?m.color:"#fff";
    b.style.color=on?"#fff":m.color;
  });
}
renderFilters();

function renderBeats(){
  $("beats").innerHTML="";
  const gs=groupStarts();
  for(let i=0;i<ts.b;i++){const d=document.createElement("div");d.className=gs.has(i)?"dot":"dot sub";$("beats").appendChild(d);}
}
renderBeats();

// ---------- notation (五線譜 / TAB譜) ----------
const LETTERS={C:0,D:1,E:2,F:3,G:4,A:5,B:6};
const INK="#20242B", ACCENT="#E4A93B";

// 五線譜: 1オクターブ上行。ch=特徴音は琥珀色ノートヘッド+リング
function svgStaff(notes){
  const W=384,H=112,x0=56,sp=(W-x0-8)/notes.length;
  let out=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  for(let i=0;i<5;i++){const y=76-i*8;out+=`<line x1="6" y1="${y}" x2="${W-6}" y2="${y}" stroke="${INK}" stroke-width="1" opacity=".5"/>`;}
  out+=`<text x="10" y="82" font-size="52" fill="${INK}">𝄞</text>`;
  notes.forEach((n,i)=>{
    const x=x0+sp*i+sp/2, y=76-(n.st-30)*4;
    for(let st=28;st>=n.st;st-=2){const ly=76-(st-30)*4;out+=`<line x1="${x-9}" y1="${ly}" x2="${x+9}" y2="${ly}" stroke="${INK}" stroke-width="1" opacity=".5"/>`;}
    for(let st=40;st<=n.st;st+=2){const ly=76-(st-30)*4;out+=`<line x1="${x-9}" y1="${ly}" x2="${x+9}" y2="${ly}" stroke="${INK}" stroke-width="1" opacity=".5"/>`;}
    if(n.ch) out+=`<circle cx="${x}" cy="${y}" r="9" fill="none" stroke="${ACCENT}" stroke-width="2"/>`;
    if(n.acc) out+=`<text x="${x-15}" y="${y+4.5}" font-size="13" font-weight="700" fill="${n.ch?"#7A4A00":INK}">${n.acc}</text>`;
    out+=`<ellipse cx="${x}" cy="${y}" rx="5.4" ry="4.1" fill="${n.ch?ACCENT:INK}" stroke="${INK}" stroke-width="1" transform="rotate(-14 ${x} ${y})"/>`;
  });
  return out+"</svg>";
}

// TAB譜: ルートを6弦(高フレットなら5弦)に置いたポジションボックスで割り当て
function tabPositions(rootPc, ivs){
  const S=[40,45,50,55,59,64]; // 低E→高e の開放弦MIDI
  const f6=((rootPc-4)+12)%12;
  let s0,f0;
  if(f6<=6){s0=0;f0=f6;} else {s0=1;f0=((rootPc-9)+12)%12;}
  const rootMidi=S[s0]+f0;
  let str=s0;
  return ivs.map(v=>{
    const midi=rootMidi+v;
    let fret=midi-S[str];
    while(fret>f0+3&&str<5){str++;fret=midi-S[str];}
    return {str,fret};
  });
}
function svgTab(posns,notes,bg){
  const W=384,H=72,x0=56,sp=(W-x0-8)/notes.length;
  let out=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  for(let i=0;i<6;i++){const y=8+i*10;out+=`<line x1="6" y1="${y}" x2="${W-6}" y2="${y}" stroke="${INK}" stroke-width="1" opacity=".5"/>`;}
  ["T","A","B"].forEach((c,i)=>{out+=`<text x="16" y="${22+i*13}" font-size="11" font-weight="700" font-family="system-ui,sans-serif" fill="${INK}" text-anchor="middle">${c}</text>`;});
  posns.forEach((p,i)=>{
    const x=x0+sp*i+sp/2, y=8+(5-p.str)*10;
    if(notes[i].ch) out+=`<circle cx="${x}" cy="${y}" r="7.5" fill="${ACCENT}" stroke="${INK}" stroke-width="1"/>`;
    else out+=`<rect x="${x-7}" y="${y-5.5}" width="14" height="11" fill="${bg}"/>`;
    out+=`<text x="${x}" y="${y+3.5}" font-size="10.5" font-weight="${notes[i].ch?700:600}" font-family="ui-monospace,Menlo,monospace" fill="${INK}" text-anchor="middle">${p.fret}</text>`;
  });
  return out+"</svg>";
}

function renderCard(){
  const k=KEYS[keyIndex], m=CATS[current.cat];
  const chordRoot=nn(k.pc+current.cr,k.f);
  const s=SCALES[currentScale.sc], scaleRoot=(k.pc+currentScale.sr)%12;
  const chSet=new Set(s.ch);
  $("flash").style.background=m.bg;
  $("badge").textContent=progMode==="random" ? current.roman+" ・ "+m.label
    : PROGS[progMode].label+" ・ "+current.roman+" ("+(progStep+1)+"/"+PROGS[progMode].steps.length+")";
  $("badge").style.color=m.color;
  $("chord").textContent=chordRoot+SUF[current.ct];
  $("scaleName").textContent=nn(scaleRoot,k.f)+" "+s.ja;
  $("scaleName").style.color=m.color;
  $("scaleNotes").innerHTML=s.iv.map(v=>{
    const name=nn(scaleRoot+v,k.f);
    return chSet.has(v)?`<span class="chNote">${name}</span>`:name;
  }).join("  ");
  // 譜面用ノート列(1オクターブ+ルートのオクターブ音)
  const ivs=[...s.iv,12];
  const notes=ivs.map(v=>{
    const midi=60+scaleRoot+v;
    const name=nn(scaleRoot+v,k.f);
    const acc=name.length>1?(name[1]==="#"?"♯":"♭"):"";
    const oct=Math.floor(midi/12)-1;
    return {midi,acc,st:oct*7+LETTERS[name[0]],ch:chSet.has(v)};
  });
  $("staffWrap").innerHTML=svgStaff(notes);
  $("tabWrap").innerHTML=svgTab(tabPositions(scaleRoot,ivs),notes,m.bg);
  $("chDot").style.display=s.ch.length?"":"none"; // 特徴音なしのスケールでは凡例ドットを出さない
  $("chLabel").textContent="特徴音: "+s.chJa;
}
renderCard();

// 進行モード中は効かない設定(小節/コード・カテゴリフィルタ)をグレーアウト
function updateModeUI(){
  const prog=progMode!=="random";
  $("barsSel").disabled=prog;
  $("barsSel").parentElement.classList.toggle("dimmed",prog);
  [...$("filters").children].forEach(b=>b.disabled=prog);
}

// 抽選(currentの更新)と描画を分離: オーディオスケジューリングからは pickNext/stepNext を同期で呼び、描画のみ Tone.Draw に遅延させる
function chooseScale(entry){
  const opts=[{sr:entry.sr,sc:entry.sc},...((scaleVariety&&entry.alts)?entry.alts:[])];
  currentScale=opts[Math.floor(Math.random()*opts.length)];
}
function pickNext(){
  let pool=ENTRIES.filter(e=>cats[e.cat]);
  if(pool.length===0) pool=ENTRIES;
  let e;
  do{ e=pool[Math.floor(Math.random()*pool.length)]; }while(pool.length>1&&e.id===lastId);
  lastId=e.id; current=e; chooseScale(e);
}
function stepNext(){ // ジャンル進行を1コード進める
  const steps=PROGS[progMode].steps;
  progStep=(progStep+1)%steps.length;
  current=steps[progStep]; chooseScale(current);
}
function advance(){ if(progMode==="random") pickNext(); else stepNext(); }
function advanceManual(){ advance(); renderCard(); lastChangeBar=barCount; }

// ---------- metronome ----------
// 変則分母(6,5,7等)のパルスをtick単位で整数にするため高解像度PPQにする (2520*4=10080 は 2..10,12,14,16 で割り切れる)
Tone.Transport.PPQ=2520;
function setBpm(v){ bpm=Math.min(300,Math.max(30,v)); $("bpmVal").textContent=bpm; $("bpmSlider").value=bpm; Tone.Transport.bpm.value=bpm; }
$("bpmDown").onclick=()=>setBpm(bpm-1);
$("bpmUp").onclick=()=>setBpm(bpm+1);
$("bpmSlider").oninput=e=>setBpm(+e.target.value);
// カスタム拍子: 分子1〜24 × 分母{2,3,4,5,6,7,8,9,10,12,16}(6=四分三連単位などの変則分母も可)
function parseGroups(txt,b){
  const parts=(txt||"").split("+").map(s=>parseInt(s.trim(),10)).filter(n=>n>0);
  return (parts.length>1&&parts.reduce((a,c)=>a+c,0)===b)?parts:null;
}
function applyCustomTs(){
  const b=Math.min(24,Math.max(1,+$("ctsNum").value||8)), u=+$("ctsDen").value;
  ts={b,u,g:parseGroups($("ctsGrp").value,b)};
  renderBeats(); if(playing){stop(); start();}
}
$("tsSel").onchange=e=>{
  const custom=e.target.value==="custom";
  $("customTs").style.display=custom?"flex":"none";
  if(custom){applyCustomTs(); return;}
  ts=TSIGS[e.target.value]; renderBeats(); if(playing){stop(); start();}
};
$("ctsNum").onchange=$("ctsDen").onchange=$("ctsGrp").onchange=()=>{ if($("tsSel").value==="custom") applyCustomTs(); };
function updateFeelHint(){
  $("feelHint").textContent = feel==="just" ? "" :
    feel==="ahead" ? `前ノリ: クリックが正拍(小さなガイド音)より ${feelMs}ms 早く鳴ります`
                   : `後ノリ: クリックが正拍(小さなガイド音)より ${feelMs}ms 遅く鳴ります`;
}
$("feelSel").onchange=e=>{feel=e.target.value; updateFeelHint();};
$("feelAmt").onchange=e=>{feelMs=+e.target.value; updateFeelHint();};
$("clickChk").onchange=e=>{clickOn=e.target.checked;};
$("chordChk").onchange=e=>{chordSoundOn=e.target.checked;};
$("scaleChk").onchange=e=>{scaleSoundOn=e.target.checked;};
$("countChk").onchange=e=>{countIn=e.target.checked;};
$("barsSel").onchange=e=>{barsPerChord=+e.target.value;};
$("autoChk").onchange=e=>{autoAdv=e.target.checked; if(playing&&autoAdv) lastChangeBar=barCount;};
$("keySel").onchange=e=>{keyIndex=+e.target.value; renderCard();};
$("nextBtn").onclick=advanceManual;
$("progSel").onchange=e=>{
  progMode=e.target.value; progStep=0;
  if(progMode==="random") pickNext();
  else { current=PROGS[progMode].steps[0]; chooseScale(current); }
  renderCard(); updateModeUI(); lastChangeBar=barCount;
};
$("varietyChk").onchange=e=>{scaleVariety=e.target.checked; chooseScale(current); renderCard();};

$("tapBtn").onclick=()=>{
  const now=performance.now();
  tapTimes=tapTimes.filter(t=>now-t<2500); tapTimes.push(now); tapTimes=tapTimes.slice(-5);
  if(tapTimes.length>=2){
    let sum=0; for(let i=1;i<tapTimes.length;i++) sum+=tapTimes[i]-tapTimes[i-1];
    const v=Math.round(60000/(sum/(tapTimes.length-1)));
    if(v>=30&&v<=300) setBpm(v);
  }
};

function start(){
  Tone.Transport.bpm.value=bpm;
  Tone.Transport.timeSignature=[ts.b,ts.u];
  const env={attack:0.001,decay:0.05,sustain:0,release:0.01};
  hi=new Tone.Synth({oscillator:{type:"triangle"},envelope:env}).toDestination(); hi.volume.value=-8;
  lo=new Tone.Synth({oscillator:{type:"triangle"},envelope:env}).toDestination(); lo.volume.value=-4;
  guide=new Tone.Synth({oscillator:{type:"square"},envelope:env}).toDestination(); guide.volume.value=-22;
  chordSynth=new Tone.PolySynth(Tone.Synth,{oscillator:{type:"triangle"},envelope:{attack:0.02,decay:0.2,sustain:0.5,release:0.4}}).toDestination();
  chordSynth.volume.value=-14;
  scaleSynth=new Tone.Synth({oscillator:{type:"triangle"},envelope:{attack:0.005,decay:0.15,sustain:0.2,release:0.15}}).toDestination();
  scaleSynth.volume.value=-11;
  const gs=groupStarts();
  let beat=0;
  clickLoop=new Tone.Loop(time=>{
    const b=beat%ts.b, down=b===0, grp=gs.has(b);
    const inCount=countIn&&beat<ts.b; // カウントイン中(最初の1小節)はクリックOFFでも必ず鳴らす
    // ノリ: ガイド音は正拍、クリックは±feelMsずらす(Loopのlookahead≈100ms内なので負方向も安全)
    const off=feel==="ahead"?-feelMs/1000:feel==="behind"?feelMs/1000:0;
    if(inCount){
      (down?lo:hi).triggerAttackRelease(down?"C5":"G5","32n",time);
    } else if(clickOn){
      if(off!==0) guide.triggerAttackRelease("C6","64n",time);
      (down?lo:hi).triggerAttackRelease(down?"C5":grp?"G5":"E5","32n",time+off,grp?1:0.6);
    }
    Tone.Draw.schedule(()=>{
      [...$("beats").children].forEach((d,i)=>{
        d.className=(gs.has(i)?"dot":"dot sub")+(i===b?(b===0?" down":" on"):"");
      });
    },time+off);
    beat++;
  },Math.round(Tone.Transport.PPQ*4/ts.u)+"i").start(0);
  // 小節単位の処理をここに集約: コード進行の更新(同期)→ コード音/スケール音の再生
  // ※コード切替を別Loop+Tone.Drawで行うと、切替小節でコード音が旧コードを鳴らす(1小節遅れ)ため必ずこの順序で行う
  barCount=0; lastChangeBar=0;
  barLoop=new Tone.Loop(time=>{
    const stepLen=progMode==="random"?barsPerChord:PROGS[progMode].steps[progStep].bars;
    if(autoAdv&&barCount>0&&barCount-lastChangeBar>=stepLen){
      advance(); lastChangeBar=barCount;
      Tone.Draw.schedule(renderCard,time);
    }
    const barDur=Tone.Time("1m").toSeconds();
    if(chordSoundOn) chordSynth.triggerAttackRelease(chordFreqs(),barDur*0.9,time);
    if(scaleSoundOn){
      const fs=scaleFreqs(), step=barDur/fs.length;
      fs.forEach((f,i)=>scaleSynth.triggerAttackRelease(f,step*0.85,time+i*step));
    }
    barCount++;
  },"1m").start(countIn?"1m":0); // カウントインON時はコード/スケール/進行を1小節遅らせる
  Tone.Transport.start();
}
function stop(){
  if(clickLoop){clickLoop.dispose();clickLoop=null;}
  if(barLoop){barLoop.dispose();barLoop=null;}
  if(hi){hi.dispose();hi=null;} if(lo){lo.dispose();lo=null;}
  if(guide){guide.dispose();guide=null;}
  if(chordSynth){chordSynth.dispose();chordSynth=null;}
  if(scaleSynth){scaleSynth.dispose();scaleSynth=null;}
  Tone.Transport.stop(); Tone.Transport.cancel();
  renderBeats();
}
// 再生中は画面スリープを防ぐ(未対応ブラウザでは何もしない)
let wakeLock=null;
async function acquireWakeLock(){
  try{ if("wakeLock" in navigator) wakeLock=await navigator.wakeLock.request("screen"); }catch(e){}
}
function releaseWakeLock(){ if(wakeLock){ wakeLock.release().catch(()=>{}); wakeLock=null; } }
// バックグラウンド復帰時: Wake Lockは自動解放されるので再取得し、サスペンドされたオーディオを再開する
document.addEventListener("visibilitychange",()=>{
  if(!document.hidden&&playing){
    acquireWakeLock();
    if(Tone.context.state!=="running") Tone.context.resume();
  }
});

$("playBtn").onclick=async()=>{
  if(!playing){ await Tone.start(); start(); playing=true; acquireWakeLock(); $("playBtn").textContent="■ 停止"; $("playBtn").classList.add("playing"); }
  else { stop(); playing=false; releaseWakeLock(); $("playBtn").textContent="▶ 開始"; $("playBtn").classList.remove("playing"); }
};

// ---------- settings persistence ----------
const SETTINGS_KEY="adlib-settings-v1";
let saveT=null;
function saveSettings(){
  try{
    localStorage.setItem(SETTINGS_KEY,JSON.stringify({
      keyIndex,cats,bpm,tsVal:$("tsSel").value,ctsNum:$("ctsNum").value,ctsDen:$("ctsDen").value,ctsGrp:$("ctsGrp").value,
      barsPerChord,autoAdv,feel,feelMs,clickOn,chordSoundOn,scaleSoundOn,countIn,scaleVariety,progMode,
    }));
  }catch(e){}
}
function scheduleSave(){ clearTimeout(saveT); saveT=setTimeout(saveSettings,300); }
function loadSettings(){
  let s=null;
  try{ s=JSON.parse(localStorage.getItem(SETTINGS_KEY)); }catch(e){}
  if(!s) return;
  const chg=el=>el.dispatchEvent(new Event("change"));
  if(Number.isInteger(s.keyIndex)&&KEYS[s.keyIndex]){ $("keySel").value=s.keyIndex; chg($("keySel")); }
  if(s.cats){ Object.keys(cats).forEach(k=>{ if(typeof s.cats[k]==="boolean") cats[k]=s.cats[k]; }); renderFilters(); }
  if(typeof s.bpm==="number") setBpm(s.bpm);
  [["barsSel",s.barsPerChord],["feelSel",s.feel],["feelAmt",s.feelMs]].forEach(([id,v])=>{
    if(v!=null){ $(id).value=v; chg($(id)); }
  });
  [["autoChk",s.autoAdv],["clickChk",s.clickOn],["chordChk",s.chordSoundOn],["scaleChk",s.scaleSoundOn],["countChk",s.countIn],["varietyChk",s.scaleVariety]].forEach(([id,v])=>{
    if(typeof v==="boolean"){ $(id).checked=v; chg($(id)); }
  });
  if(s.tsVal&&(TSIGS[s.tsVal]||s.tsVal==="custom")){
    if(s.tsVal==="custom"){ $("ctsNum").value=s.ctsNum||8; $("ctsDen").value=s.ctsDen||"6"; $("ctsGrp").value=s.ctsGrp||""; }
    $("tsSel").value=s.tsVal; chg($("tsSel"));
  }
  if(s.progMode&&(s.progMode==="random"||PROGS[s.progMode])){ $("progSel").value=s.progMode; chg($("progSel")); }
}
["keySel","tsSel","barsSel","autoChk","feelSel","feelAmt","clickChk","chordChk","scaleChk","countChk","progSel","varietyChk","ctsNum","ctsDen","ctsGrp"]
  .forEach(id=>$(id).addEventListener("change",scheduleSave));
[...$("filters").children].forEach(b=>b.addEventListener("click",scheduleSave));
$("bpmSlider").addEventListener("change",scheduleSave);
const _setBpm=setBpm; setBpm=v=>{_setBpm(v); scheduleSave();};
loadSettings();
updateModeUI();

// ---------- PWA ----------
if("serviceWorker" in navigator && (location.protocol==="https:"||["localhost","127.0.0.1"].includes(location.hostname))){
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
</script>
